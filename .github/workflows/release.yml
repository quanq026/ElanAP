name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          & "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\MSBuild.exe" ElanAP\ElanAP.csproj /p:Configuration=Release /v:minimal

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            ElanAP/bin/Release/ElanAP.exe
            ElanAP/bin/Release/ElanAP.exe.config
            ElanAP/bin/Release/HidSharp.dll
